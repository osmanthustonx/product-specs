name: Spec Updated - Notify Existing Issues

on:
  push:
    branches: [main]
    paths:
      - 'openspec/specs/**'

env:
  FE_REPO: ${{ github.repository_owner }}/frontend-app
  BE_REPO: ${{ github.repository_owner }}/backend-app

jobs:
  notify-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed specs
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- openspec/specs/ | grep 'spec.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          # Extract featureIds from changed spec paths
          FEATURES=""
          for F in $CHANGED; do
            # openspec/specs/todo/spec.md -> todo
            FID=$(echo "$F" | sed 's|openspec/specs/||' | sed 's|/spec.md||')
            FEATURES="$FEATURES$FID\n"
          done
          echo "features<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FEATURES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on existing issues
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROSS_REPO_PAT }}
          script: |
            const features = `${{ steps.changed.outputs.features }}`.trim().split('\n').filter(Boolean);
            const [feOwner, feRepo] = process.env.FE_REPO.split('/');
            const [beOwner, beRepo] = process.env.BE_REPO.split('/');
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            for (const featureId of features) {
              const specLink = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/openspec/specs/${featureId}/spec.md`;

              // Search for existing issues in FE and BE repos
              for (const [owner, repo, prefix] of [[feOwner, feRepo, 'FE'], [beOwner, beRepo, 'BE']]) {
                try {
                  const { data: issues } = await github.rest.issues.listForRepo({
                    owner,
                    repo,
                    state: 'open',
                    labels: 'spec-task',
                  });

                  // Find issues matching this featureId by checking the hidden comment
                  const matching = issues.filter(i =>
                    i.body && i.body.includes(`featureId=${featureId}`)
                  );

                  for (const issue of matching) {
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number: issue.number,
                      body: [
                        `## Spec Updated`,
                        '',
                        `The spec for \`${featureId}\` has been updated.`,
                        '',
                        `- [View updated spec](${specLink})`,
                        `- [View commit](${commitUrl})`,
                        '',
                        'Please review the spec changes and update your implementation accordingly.',
                      ].join('\n'),
                    });

                    // Add spec-updated label
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: issue.number,
                      labels: ['spec-updated'],
                    });

                    console.log(`Notified ${prefix} issue #${issue.number} for ${featureId}`);
                  }
                } catch (e) {
                  console.log(`Error searching ${prefix} repo: ${e.message}`);
                }
              }
            }
